        offset:
          type: integer

    # ==========================================
    # Account Schemas
    # ==========================================
    PlatformInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        canonical:
          type: string
        logoUrl:
          type: string
        type:
          type: string

    AccountResponse:
      type: object
      required: [id, path, type, status, openDate, bookingMethod, isCustom]
      properties:
        id:
          type: string
          format: uuid
        path:
          type: string
          description: Full Beancount account path
        type:
          $ref: '#/components/schemas/AccountType'
        status:
          $ref: '#/components/schemas/AccountStatus'
        openDate:
          type: string
          format: date
        closeDate:
          type: string
          format: date
        currencies:
          type: array
          items:
            type: string
          nullable: true
        bookingMethod:
          $ref: '#/components/schemas/BookingMethod'
        templatePath:
          type: string
        isCustom:
          type: boolean
        i18nKey:
          type: string
          maxLength: 100
        icon:
          type: string
          maxLength: 50
        openMeta:
          type: object
          additionalProperties: true
        platformId:
          type: string
          format: uuid
          nullable: true
        platform:
          $ref: '#/components/schemas/PlatformInfo'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateAccountRequest:
      type: object
      required: [path, openDate]
      properties:
        path:
          type: string
          pattern: '^(Assets|Liabilities|Income|Expenses|Equity)(:[A-Za-z0-9]+)+$'
          description: Full Beancount account path
        openDate:
          type: string
          format: date
        currencies:
          type: array
          items:
            type: string
          nullable: true
        bookingMethod:
          $ref: '#/components/schemas/BookingMethod'
        templatePath:
          type: string
        isCustom:
          type: boolean
          default: false
        i18nKey:
          type: string
          maxLength: 100
        icon:
          type: string
          maxLength: 50
        openMeta:
          type: object
          additionalProperties: true
        platformId:
          type: string
          format: uuid

    UpdateAccountRequest:
      type: object
      properties:
        currencies:
          type: array
          items:
            type: string
          nullable: true
        bookingMethod:
          $ref: '#/components/schemas/BookingMethod'
        i18nKey:
          type: string
          maxLength: 100
        icon:
          type: string
          maxLength: 50

    AccountListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'
        total:
          type: integer

    # ==========================================
    # Commodity Schemas
    # ==========================================
    CommodityResponse:
      type: object
      required: [id, symbol, date]
      properties:
        id:
          type: string
        userId:
          type: string
          nullable: true
        symbol:
          type: string
          maxLength: 50
        date:
          type: string
          format: date
        metadata:
          type: object
          additionalProperties: true
        symbolProfileId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCommodityRequest:
      type: object
      required: [symbol, date]
      properties:
        symbol:
          type: string
          maxLength: 50
          pattern: '^[A-Z0-9_\-\.]+$'
        date:
          type: string
          format: date
        metadata:
          type: object
          additionalProperties: true
        symbolProfileId:
          type: string
          format: uuid

    UpdateCommodityRequest:
      type: object
      properties:
        metadata:
          type: object
          additionalProperties: true
        symbolProfileId:
          type: string
          format: uuid

    EnsureCommodityRequest:
      type: object
      required: [date]
      properties:
        date:
          type: string
          format: date
        metadata:
          type: object
          additionalProperties: true
        symbolProfileId:
          type: string
          format: uuid

    CommodityListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CommodityResponse'
        total:
          type: integer

    # ==========================================
    # Price Schemas
    # ==========================================
    PriceResponse:
      type: object
      required: [id, userId, currency, quoteCurrency, amount, date]
      properties:
        id:
          type: string
        userId:
          type: string
        currency:
          type: string
        quoteCurrency:
          type: string
        amount:
          type: number
          minimum: 0
        date:
          type: string
          format: date
        meta:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePriceRequest:
      type: object
      required: [currency, quoteCurrency, amount, date]
      properties:
        currency:
          type: string
          description: Base currency (e.g., "USD")
        quoteCurrency:
          type: string
          description: Quote currency (e.g., "CNY")
        amount:
          type: number
          minimum: 0
          description: Exchange rate
        date:
          type: string
          format: date
        metadata:
          type: object
          additionalProperties: true

    UpdatePriceRequest:
      type: object
      properties:
        amount:
          type: number
          minimum: 0
        metadata:
          type: object
          additionalProperties: true

    PriceListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PriceResponse'
        total:
          type: integer

    # ==========================================
    # Balance Schemas
    # ==========================================
    BalanceResponse:
      type: object
      required: [account, balance, currency, date]
      properties:
        account:
          type: string
        balance:
          type: string
          description: Decimal string for precision
        currency:
          type: string
        date:
          type: string
          format: date

    MultiCurrencyBalanceResponse:
      type: object
      required: [account, balances, date]
      properties:
        account:
          type: string
        balances:
          type: object
          additionalProperties:
            type: string
          description: Map of currency to balance (decimal strings)
        date:
          type: string
          format: date

    # ==========================================
    # Error Schemas (RFC 9457)
    # ==========================================
    ApiError:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          description: Error type URI
        title:
          type: string
          description: Short error title
        status:
          type: integer
          description: HTTP status code
        detail:
          type: string
          description: Detailed error message
        instance:
          type: string
          description: Request path

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

    Conflict:
      description: Resource conflict (e.g., account has postings)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
