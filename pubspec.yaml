name: beanclaw
description: "Beancount account management mobile app - Your personal finance companion"
version: 0.0.1
homepage: https://github.com/fire-zu/beanclaw
repository: https://github.com/fire-zu/beanclaw
issue_tracker: https://github.com/fire-zu/beanclaw/issues
documentation: https://github.com/fire-zu/beanclaw/blob/main/README.md

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0

  # HTTP & API
  http: ^1.2.0
  web_socket_channel: ^2.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Utils
  intl: ^0.19.0
  logger: ^2.3.0
  uuid: ^4.4.0

  # UI Components
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
