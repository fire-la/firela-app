name: firela
description: "Beancount account management for mobile - Data sovereignty for your financial data"
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  http: ^1.2.0
  intl: ^0.19.0
  meta: ^1.9.0
  json_annotation: ^4.8.1
  built_value: ^8.9.0
  built_collection: ^5.1.1
  firela_api:
    path: lib/api/generated

  # Parser dependencies (Phase 33.2-02)
  decimal: ^2.3.3      # Precise decimal arithmetic for financial calculations
  csv: ^6.0.0          # CSV parsing
  charset: ^1.0.0      # Official Dart charset library with GBK support
  file_picker: ^8.0.0  # File selection

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  built_value_generator: ^8.9.0
  lints: ^3.0.0

flutter:
  uses-material-design: true
