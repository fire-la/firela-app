name: Regenerate API Types

on:
  # Triggered when spec-publish-sync.yml's PR auto-merges to main
  push:
    branches: [main]
    paths:
      - 'lib/api/spec/openapi.yaml'
  repository_dispatch:
    types: [api-types-updated]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout firela-app
        uses: actions/checkout@v4

      # Java required by openapi_generator (JAR-based tool)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      # Use local spec file if available (push trigger), otherwise download from main
      - name: Prepare spec file
        run: |
          if [ -f lib/api/spec/openapi.yaml ]; then
            echo "Using local spec file (push trigger)"
            cp lib/api/spec/openapi.yaml openapi.yaml
          else
            echo "Downloading spec from main branch (dispatch trigger)"
            curl -sL -o openapi.yaml \
              https://raw.githubusercontent.com/fire-la/firela-app/main/lib/api/spec/openapi.yaml
          fi

      # Update build.yaml to eliminate deprecated api-specs fallback URL
      - name: Update build.yaml URL
        run: |
          sed -i 's|https://raw.githubusercontent.com/fire-la/api-specs/main/openapi.yaml|https://raw.githubusercontent.com/fire-la/firela-app/main/lib/api/spec/openapi.yaml|g' build.yaml

      - name: Generate types
        run: dart run build_runner build --delete-conflicting-outputs --build-filter="lib/api/**"

      - name: Verify compilation
        run: dart analyze lib/api/generated/

      - name: Create PR if changed
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/api-types
          title: "chore: regenerate Dart API types from OpenAPI spec"
          commit-message: "chore: regenerate Dart API types from OpenAPI spec + update build.yaml URL"
          labels: automated, api-types
          body: |
            Auto-regenerated Dart API types from OpenAPI spec.

            **Trigger:** ign@${{ github.event.client_payload.sha }}

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-operation == 'created' || steps.create-pr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-url }}"

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: 'fire-la',
              repo: 'firela-app',
              title: `API type regeneration failed: ${context.sha}`,
              body: `Regeneration triggered by ign@${{ github.event.client_payload.sha || github.sha }}.\n\n[View run](${{ github.serverUrl }}/${{ github.repository }}/actions/runs/${{ github.runId }})`,
              labels: ['api-types-failure']
            })
