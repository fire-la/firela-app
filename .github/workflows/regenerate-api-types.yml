name: Regenerate API Types

on:
  # Triggered when spec-publish-sync.yml's PR auto-merges to main
  push:
    branches: [main]
    paths:
      - 'lib/api/spec/openapi.yaml'
  repository_dispatch:
    types: [api-types-updated]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout firela-app
        uses: actions/checkout@v4

      # Java required by openapi_generator (JAR-based tool)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      # Download the stock OpenAPITools CLI JAR (7.2.0) — the same version that produced
      # the committed models. Invoked directly below, NOT via the openapi_generator Dart
      # builder: its ^6.0.0 CLI defaults to generator 7.9.0 + the "NextGen" dart generator,
      # which would rewrite every model to a different style.
      - name: Download OpenAPI Generator CLI JAR
        run: |
          curl -sL -o openapi-generator-cli.jar \
            "https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.2.0/openapi-generator-cli-7.2.0.jar"
          test -s openapi-generator-cli.jar && echo "JAR downloaded: $(ls -la openapi-generator-cli.jar)"

      # Generate model .dart files directly with stock dart-dio 7.2.0 (matches the
      # committed models → minimal diff). pubName matches the firela_api package; dart-dio
      # defaults to built_value serialization. build_runner below regenerates the .g.dart
      # serializers. Do NOT set nullableFields (would force all fields nullable).
      - name: Generate models (stock dart-dio 7.2.0)
        run: |
          java -jar openapi-generator-cli.jar generate \
            -i lib/api/spec/openapi.yaml \
            -g dart-dio \
            -o lib/api/generated \
            --additional-properties=pubName=firela_api \
            --skip-validate-spec

      # Use --build-filter to avoid SEVERE errors from parser/sanitizer files
      - name: Generate types
        run: dart run build_runner build --delete-conflicting-outputs --build-filter="lib/api/**"

      # dart-dio generator uses JsonObject but doesn't always add the import
      - name: Patch missing JsonObject imports
        run: |
          IMPORT_LINE="import 'package:built_value/json_object.dart';"
          for f in $(grep -rl 'JsonObject' lib/api/generated/ --include='*.dart'); do
            if ! grep -q "json_object" "$f"; then
              # Insert after the last existing import line
              sed -i "s|^import 'package:built_value/serializer.dart';|import 'package:built_value/json_object.dart';\nimport 'package:built_value/serializer.dart';|" "$f"
              echo "Patched: $f"
            fi
          done

      # openapi-generator generates incorrect direct assignment for BuiltList fields
      # Should use .replace() for built_value ListBuilder fields
      - name: Patch BuiltList assignment errors
        run: |
          for f in $(grep -rl 'as BuiltList;' lib/api/generated/ --include='*.dart'); do
            sed -i -E '/as BuiltList;/{ N; s/(as BuiltList;\n[[:space:]]+result\.[a-zA-Z_]+) = (valueDes);/\1.replace(\2);/; }' "$f"
            echo "Patched BuiltList: $f"
          done

      # Remove unused imports generated by openapi-generator
      - name: Remove unused imports
        run: |
          cd lib/api/generated
          dart fix --apply 2>/dev/null || true

      # Suppress remaining warnings in generated code via analysis_options
      - name: Add analysis_options for generated package
        run: |
          cat > lib/api/generated/analysis_options.yaml << 'ANALYSIS'
          analyzer:
            errors:
              unused_import: ignore
              strict_raw_type: ignore
              unused_element_parameter: ignore
          ANALYSIS

      # Update generated package SDK to match main app requirement
      - name: Patch generated pubspec SDK version
        run: |
          sed -i "s/sdk: '>=2.15.0 <3.0.0'/sdk: '^3.5.0'/" lib/api/generated/pubspec.yaml
          echo "Patched SDK version in generated pubspec.yaml"

      - name: Verify generated output
        run: |
          if [ -d lib/api/generated ] && [ "$(ls -A lib/api/generated)" ]; then
            echo "Generated files found:"
            find lib/api/generated -type f | head -30
          else
            echo "ERROR: No generated files in lib/api/generated/"
            echo "Searching for any openapi output:"
            find . -path ./node_modules -prune -o -name "*.openapi.dart" -print 2>/dev/null | head -20
            exit 1
          fi

      - name: Create PR if changed
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          # PAT (not GITHUB_TOKEN): pushes made by GITHUB_TOKEN don't trigger
          # pull_request workflows, so the analyze-sanitizer check would never
          # run and the PR couldn't auto-merge. The PAT-authored push triggers it.
          token: ${{ secrets.FIRELA_APP_PR_TOKEN }}
          branch: sync/api-types
          title: "chore: regenerate Dart API types from OpenAPI spec"
          commit-message: "chore: regenerate Dart API types from OpenAPI spec"
          labels: automated, api-types
          body: |
            Auto-regenerated Dart API types from OpenAPI spec.

            **Trigger:** ign@${{ github.event.client_payload.sha || github.sha }}

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-operation == 'created' || steps.create-pr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ secrets.FIRELA_APP_PR_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-url }}"

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `API type regeneration failed: ${context.sha}`,
              body: `Regeneration triggered by ign@${{ github.event.client_payload.sha || github.sha }}.\n\n[View run](${{ github.serverUrl }}/${{ github.repository }}/actions/runs/${{ github.runId }})`,
              labels: ['api-types-failure']
            })
